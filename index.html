<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Blow Away Your Sadness</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:-apple-system,BlinkMacSystemFont,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;position:fixed}
#app{position:relative;width:100%;height:100%;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:rgba(255,255,255,0.04);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.06);z-index:10;flex-shrink:0;gap:6px}
h1{font-size:13px;font-weight:600;color:#fff;letter-spacing:0.2px;flex-shrink:0;white-space:nowrap}
#modeBar{display:flex;gap:4px;overflow-x:auto;flex:1;scrollbar-width:none;-ms-overflow-style:none;padding:2px 0}
#modeBar::-webkit-scrollbar{display:none}
#modeBar button{padding:4px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:12px;background:transparent;color:rgba(255,255,255,0.5);font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0}
#modeBar button.active{background:#4FC3F7;color:#000;border-color:#4FC3F7}
#modeBar button:active{transform:scale(0.95)}
.pi-auth{display:flex;align-items:center;gap:5px;flex-shrink:0}
#signInBtn{padding:3px 8px;border:1px solid rgba(79,195,247,0.3);border-radius:12px;background:transparent;color:#4FC3F7;font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
#signInBtn:active{transform:scale(0.95)}
#signInBtn.loading{opacity:0.5;pointer-events:none}
#userStatus{font-size:10px;color:#4FC3F7;display:none}
#shapeBar{display:flex;align-items:center;gap:3px;padding:3px 10px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
#shapeBar::-webkit-scrollbar{display:none}
#shapeBar span{font-size:9px;color:rgba(255,255,255,0.25);margin-right:2px;flex-shrink:0}
#shapeBar button{padding:2px 8px;border:1px solid rgba(255,255,255,0.08);border-radius:8px;background:transparent;color:rgba(255,255,255,0.35);font-size:9px;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0}
#shapeBar button.active{background:rgba(79,195,247,0.18);color:#4FC3F7;border-color:rgba(79,195,247,0.25)}
#shapeBar button:active{transform:scale(0.95)}
#shapeBar button.draw-btn{color:#FFB347;border-color:rgba(255,179,71,0.25)}
#shapeBar button.draw-btn.active{background:rgba(255,179,71,0.2);color:#FFB347;border-color:rgba(255,179,71,0.35)}
#controlsBar{display:flex;align-items:center;gap:8px;padding:3px 10px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0}
#pauseBtn{width:28px;height:28px;border:1px solid rgba(255,255,255,0.12);border-radius:50%;background:transparent;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
#pauseBtn:active{transform:scale(0.9)}
#pauseBtn.paused{color:#4FC3F7;border-color:rgba(79,195,247,0.3)}
.speed-group{display:flex;align-items:center;gap:6px;flex:1}
.speed-group span{font-size:9px;color:rgba(255,255,255,0.3);white-space:nowrap}
#speedSlider{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.12);border-radius:2px;outline:none}
#speedSlider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#4FC3F7;cursor:pointer;border:none}
#speedSlider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#4FC3F7;cursor:pointer;border:none}
#c{flex:1;display:block;width:100%;margin-bottom:env(safe-area-inset-bottom,0px);touch-action:none}
#permOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:16px;padding:24px}
#permOverlay p{color:rgba(255,255,255,0.7);font-size:14px;text-align:center;max-width:280px;line-height:1.5}
#permBtn{padding:14px 32px;border:none;border-radius:24px;background:#4FC3F7;color:#000;font-size:16px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .2s;touch-action:manipulation}
#permBtn:active{opacity:.7}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a1a;color:rgba(255,255,255,0.3);font-size:13px;z-index:200}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Blow Away Your Sadness</h1>
    <div id="modeBar">
      <button data-mode="water" class="active">Water</button>
      <button data-mode="animals">Animals</button>
      <button data-mode="faces">Faces</button>
      <button data-mode="hearts">Hearts</button>
      <button data-mode="snow">Snow</button>
      <button data-mode="candy">Candy</button>
      <button data-mode="bubbles">Bubbles</button>
      <button data-mode="stars">Stars</button>
    </div>
    <div class="pi-auth">
      <button id="signInBtn">π Sign In</button>
      <span id="userStatus"></span>
    </div>
  </header>
  <div id="shapeBar">
    <span>Shape</span>
    <button data-shape="box" class="active">Box</button>
    <button data-shape="v">V</button>
    <button data-shape="bowl">Bowl</button>
    <button data-shape="split">Split</button>
    <button data-shape="funnel">Funnel</button>
    <button data-shape="heart">Heart</button>
    <button data-shape="star">Star</button>
    <button data-shape="cage">Cage</button>
    <button data-shape="stairs">Stairs</button>
    <button data-shape="zigzag">Zigzag</button>
    <button data-shape="draw" class="draw-btn">✎ Draw</button>
  </div>
  <div id="controlsBar">
    <button id="pauseBtn">⏸</button>
    <div class="speed-group">
      <span>Speed</span>
      <input type="range" id="speedSlider" min="0" max="3" step="0.05" value="1">
      <span id="speedVal">1×</span>
    </div>
  </div>
  <canvas id="c"></canvas>
</div>
<div id="permOverlay">
  <p>Tap to enable gyroscope &mdash; tilting your device controls gravity flow</p>
  <button id="permBtn">Enable Gyroscope</button>
</div>
<div id="loading">Loading&hellip;</div>

<script>
;(function(){
'use strict'

const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const permOverlay = document.getElementById('permOverlay')
const permBtn = document.getElementById('permBtn')
const loading = document.getElementById('loading')
const modeBtns = document.querySelectorAll('#modeBar button')
const shapeBtns = document.querySelectorAll('#shapeBar button')
const signInBtn = document.getElementById('signInBtn')
const userStatus = document.getElementById('userStatus')
const pauseBtn = document.getElementById('pauseBtn')
const speedSlider = document.getElementById('speedSlider')
const speedVal = document.getElementById('speedVal')

// --- Pi Network auth ---
let piUser = null
let piAccessToken = null
let piAuthed = false

async function initPi() {
  try { await Pi.init({ version: '2.0', sandbox: true }) } catch (e) { return }
  await doPiAuth()
}

async function doPiAuth() {
  if (piAuthed) return
  signInBtn.classList.add('loading')
  signInBtn.textContent = 'Connecting...'
  try {
    const auth = await Pi.authenticate(['username'], function onPayment(p) {})
    piAccessToken = auth.accessToken
    const resp = await fetch('/api/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accessToken: piAccessToken })
    })
    if (resp.ok) { const r = await resp.json(); if (r.valid) { piUser = r.user; piAuthed = true } }
    if (!piAuthed) { piUser = { username: auth.user.username, uid: auth.user.uid }; piAuthed = true }
  } catch (e) {}
  signInBtn.classList.remove('loading')
  updatePiUI()
}

function updatePiUI() {
  if (piAuthed && piUser) { signInBtn.style.display = 'none'; userStatus.style.display = 'inline'; userStatus.textContent = `π ${piUser.username}` }
  else { signInBtn.style.display = 'inline'; signInBtn.textContent = 'π Sign In'; userStatus.style.display = 'none' }
}

signInBtn.addEventListener('click', doPiAuth)

// --- Matter.js setup ---
const engine = Matter.Engine.create()
const world = engine.world
engine.gravity.x = 0; engine.gravity.y = 1; engine.gravity.scale = 0.001

// --- State ---
let mode = 'water'
let currentShape = 'box'
let particles = []
let walls = []
let W, H
let spawnCounter = 0
let dpr = 1
let isPaused = false
let speedMul = 1
let isDrawing = false
let drawPoints = []

// --- Particle config ---
const WATER_HUES = [195, 200, 205, 210]
const EMOS_ANIMALS = ['🐱','🐶','🐰','🐻','🐼','🦊','🐸','🐵','🐔','🐷','🦁','🐮','🐨','🐙','🦋','🐝','🐧','🐥']
const EMOS_FACES = ['😊','😂','😍','🤔','😴','😎','🤩','😇','🥳','😏','🥰','😜','🤗','😺','🤭','🥺','😈','🤖','👻','💀']
const EMOS_HEARTS = ['❤️','💕','💗','💖','💘','💝','💜','💙','💚','💛','🧡','🤍','🩷','🩵']
const EMOS_STARS = ['⭐','🌟','✨','💫','🌟','⭐','✨','💫','⭐','🌟']
const CANDY_COLORS = ['#FF6B6B','#FFB347','#48C9B0','#5DADE2','#AF7AC5','#F1948A','#85C1E9','#82E0AA','#F7DC6F','#F0B27A']
const CANDY_STRIPES = ['#FFF','#FFD700','#FF69B4','#00CED1','#FF6347','#FFF','#FFD700','#FFF','#FF1493','#FFF']
const BUBBLE_COLORS = ['hsla(350,70%,75%,0.35)','hsla(200,60%,80%,0.35)','hsla(280,50%,75%,0.35)','hsla(120,50%,80%,0.35)','hsla(50,60%,80%,0.35)','hsla(330,60%,78%,0.35)','hsla(180,50%,82%,0.35)']

const PARTICLE_CFG = {
  water:   { max: 280, rate: 1, batch: 3, r: [4,8],  phys: { restitution:0.02, friction:0.18, frictionAir:0.008, density:0.0012 } },
  animals: { max: 55,  rate: 4, batch: 1, r: [14,24], phys: { restitution:0.3,  friction:0.04, frictionAir:0.004, density:0.002 } },
  faces:   { max: 60,  rate: 3, batch: 1, r: [14,22], phys: { restitution:0.35, friction:0.04, frictionAir:0.005, density:0.002 } },
  hearts:  { max: 80,  rate: 3, batch: 1, r: [12,20], phys: { restitution:0.3,  friction:0.05, frictionAir:0.006, density:0.0018 } },
  snow:    { max: 200, rate: 1, batch: 2, r: [3,7],   phys: { restitution:0.05, friction:0.1,  frictionAir:0.03,  density:0.0005 } },
  candy:   { max: 120, rate: 2, batch: 2, r: [6,10],  phys: { restitution:0.2,  friction:0.12, frictionAir:0.008, density:0.0015 } },
  bubbles: { max: 100, rate: 2, batch: 2, r: [6,14],  phys: { restitution:0.6,  friction:0.02, frictionAir:0.002, density:0.0003 } },
  stars:   { max: 70,  rate: 3, batch: 1, r: [12,20], phys: { restitution:0.4,  friction:0.03, frictionAir:0.005, density:0.002 } },
}

// --- Shape builders ---
const SHAPES = {}

function seg(p1, p2, t, opts) {
  const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2
  const len = Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2)
  const a = Math.atan2(p2.y - p1.y, p2.x - p1.x)
  return Matter.Bodies.rectangle(mx, my, len + t, t, { ...opts, angle: a })
}
function perimWalls(pts, t, opts) { const r = []; for (let i = 0; i < pts.length - 1; i++) r.push(seg(pts[i], pts[i + 1], t, opts)); return r }

const O = { isStatic: true, restitution: 0.08, friction: 0.5, label: 'wall' }

SHAPES.box = (cx, cy, cw, ch, t) => [
  Matter.Bodies.rectangle(cx, cy + ch/2, cw + t*2, t, O),
  Matter.Bodies.rectangle(cx - cw/2 - t/2, cy, t, ch + t, O),
  Matter.Bodies.rectangle(cx + cw/2 + t/2, cy, t, ch + t, O),
]

SHAPES.v = (cx, cy, cw, ch, t) => {
  const hw = cw/2, len = Math.sqrt(hw*hw + ch*ch) + t, a = Math.atan2(ch, hw)
  return [Matter.Bodies.rectangle(cx - hw/2, cy, len, t, { ...O, angle: a }), Matter.Bodies.rectangle(cx + hw/2, cy, len, t, { ...O, angle: -a })]
}

SHAPES.bowl = (cx, cy, cw, ch, t) => {
  const r = []; const n = 12; const depth = ch * 0.35
  for (let i = 0; i < n; i++) {
    const frac = (i/(n-1))*2 - 1, x = cx + frac*cw/2, yOff = depth*(1 - frac*frac), y = cy + ch/2 - yOff + depth*0.3
    const slope = -2*depth*frac/(cw/2)
    r.push(Matter.Bodies.rectangle(x, y - t/2, cw/n*1.2 + t, t, { ...O, angle: Math.atan(slope) }))
  }
  r.push(Matter.Bodies.rectangle(cx - cw/2 - t/2, cy, t, ch*0.7 + t, O))
  r.push(Matter.Bodies.rectangle(cx + cw/2 + t/2, cy, t, ch*0.7 + t, O))
  return r
}

SHAPES.split = (cx, cy, cw, ch, t) => {
  const gap = Math.max(20, cw*0.08), hcw = (cw - gap)/2
  return [
    Matter.Bodies.rectangle(cx - hcw/2 - gap/2, cy + ch/2, hcw + t*2, t, O),
    Matter.Bodies.rectangle(cx - hcw - gap/2 - t/2, cy, t, ch + t, O),
    Matter.Bodies.rectangle(cx - gap/2 - t/2, cy, t, ch + t, O),
    Matter.Bodies.rectangle(cx + hcw/2 + gap/2, cy + ch/2, hcw + t*2, t, O),
    Matter.Bodies.rectangle(cx + gap/2 + t/2, cy, t, ch + t, O),
    Matter.Bodies.rectangle(cx + hcw + gap/2 + t/2, cy, t, ch + t, O),
  ]
}

SHAPES.funnel = (cx, cy, cw, ch, t) => {
  const nw = Math.max(30, cw*0.2), wh = ch*0.6, wty = cy - ch/2
  const lXs = cx - cw/2, lXe = cx - nw/2, lLen = Math.sqrt((lXe - lXs)**2 + wh**2) + t
  const rXs = cx + cw/2, rXe = cx + nw/2, rLen = Math.sqrt((rXe - rXs)**2 + wh**2) + t
  return [Matter.Bodies.rectangle((lXs+lXe)/2, wty+wh/2, lLen, t, { ...O, angle: Math.atan2(wh, lXe-lXs) }), Matter.Bodies.rectangle((rXs+rXe)/2, wty+wh/2, rLen, t, { ...O, angle: Math.atan2(wh, rXe-rXs) }), Matter.Bodies.rectangle(cx, wty+wh+t/2, nw+t*2, t, O)]
}

SHAPES.heart = (cx, cy, cw, ch, t) => {
  const n = 28, s = Math.min(cw, ch*1.1)/18, pts = []
  for (let i = 0; i < n; i++) {
    const th = (i/n)*Math.PI*2 + 0.4
    const hx = 16*Math.pow(Math.sin(th), 3)*s, hy = (13*Math.cos(th) - 5*Math.cos(2*th) - 2*Math.cos(3*th) - Math.cos(4*th))*s
    if (hy > -ch*0.15) pts.push({ x: cx + hx, y: cy - hy + ch*0.05 })
  }
  return perimWalls(pts, t, O)
}

SHAPES.star = (cx, cy, cw, ch, t) => {
  const pts = 5, or = Math.min(cw, ch)/2, ir = or*0.4, perim = []
  const startAngle = -Math.PI/2 - Math.PI/pts*0.6
  for (let i = 0; i < pts*2 - 2; i++) { const ang = startAngle + i*Math.PI/pts; perim.push({ x: cx + (i%2===0?or:ir)*Math.cos(ang), y: cy + (i%2===0?or:ir)*Math.sin(ang) }) }
  return perimWalls(perim, t, O)
}

SHAPES.cage = (cx, cy, cw, ch, t) => {
  const r = [Matter.Bodies.rectangle(cx, cy+ch/2, cw+t*2, t, O), Matter.Bodies.rectangle(cx-cw/2-t/2, cy, t, ch+t, O), Matter.Bodies.rectangle(cx+cw/2+t/2, cy, t, ch+t, O)]
  for (let i = 1; i <= 6; i++) r.push(Matter.Bodies.rectangle(cx - cw/2 + i*cw/7, cy - ch/2, t*0.5, ch*0.35, O))
  return r
}

SHAPES.stairs = (cx, cy, cw, ch, t) => {
  const r = [], steps = 5, sw = cw/steps, sh = ch/steps*0.7
  for (let i = 0; i < steps; i++) { const sx = cx - cw/2 + i*sw + sw/2, sy = cy + ch/2 - i*sh; r.push(Matter.Bodies.rectangle(sx, sy, sw+t, t, O)); r.push(Matter.Bodies.rectangle(sx, sy - sh/2 - t/2, t, sh+t, O)) }
  r.push(Matter.Bodies.rectangle(cx + cw/2 + t/2, cy, t, ch+t, O))
  return r
}

SHAPES.zigzag = (cx, cy, cw, ch, t) => {
  const r = [], n = 5, sh = ch/n*0.65, inset = cw*0.25
  for (let i = 0; i < n; i++) {
    const yy = cy + ch/2 - sh*0.5 - i*sh, gap = i%2===0
    r.push(Matter.Bodies.rectangle(cx - cw/2 + (gap?0:inset) + (cw-inset)/2, yy, cw-inset+t, t, O))
    if (i>0) { const py = cy + ch/2 - sh*0.5 - (i-1)*sh; r.push(Matter.Bodies.rectangle(cx - cw/2 + (gap?0:inset) + t/2, (yy+py)/2, t, sh+t, O)) }
  }
  r.push(Matter.Bodies.rectangle(cx - cw/2 - t/2, cy, t, ch+t, O), Matter.Bodies.rectangle(cx + cw/2 + t/2, cy, t, ch+t, O))
  return r
}

// --- Canvas sizing ---
function resize() {
  dpr = window.devicePixelRatio || 1; W = window.innerWidth; H = window.innerHeight
  canvas.width = W * dpr; canvas.height = H * dpr; canvas.style.width = W + 'px'; canvas.style.height = H + 'px'
  if (currentShape !== 'draw') buildContainer()
}

// --- Container ---
function buildContainer() {
  walls.forEach(w => Matter.Composite.remove(world, w)); walls = []
  const cw = Math.min(W * 0.82, 420), ch = Math.min(H * 0.28, 160), t = 16, cx = W/2, cy = H - ch/2 - 64
  if (SHAPES[currentShape]) walls = SHAPES[currentShape](cx, cy, cw, ch, t)
  else walls = SHAPES.box(cx, cy, cw, ch, t)
  Matter.Composite.add(world, walls)
}

// --- Drawing ---
function getPos(e) {
  const rect = canvas.getBoundingClientRect()
  const t = e.touches ? e.touches[0] : e
  return { x: t.clientX - rect.left, y: t.clientY - rect.top }
}

function samplePts(pts, minDist) {
  const r = [pts[0]]
  for (let i = 1; i < pts.length; i++) {
    const last = r[r.length - 1], dx = pts[i].x - last.x, dy = pts[i].y - last.y
    if (Math.sqrt(dx*dx + dy*dy) >= minDist) r.push(pts[i])
  }
  return r
}

function onPointerDown(e) {
  if (currentShape !== 'draw' || isPaused) return
  isDrawing = true
  drawPoints = [getPos(e)]
  canvas.setPointerCapture(e.pointerId)
}

function onPointerMove(e) {
  if (!isDrawing) return
  drawPoints.push(getPos(e))
}

function onPointerUp() {
  if (!isDrawing) return; isDrawing = false
  if (drawPoints.length < 5) { drawPoints = []; return }
  walls.forEach(w => Matter.Composite.remove(world, w)); walls = []
  const sampled = samplePts(drawPoints, 20), tw = 16
  for (let i = 0; i < sampled.length - 1; i++) {
    const p1 = sampled[i], p2 = sampled[i+1], mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2
    const len = Math.sqrt((p2.x-p1.x)**2 + (p2.y-p1.y)**2), a = Math.atan2(p2.y-p1.y, p2.x-p1.x)
    walls.push(Matter.Bodies.rectangle(mx, my, len + tw, tw, O))
  }
  Matter.Composite.add(world, walls)
}

canvas.addEventListener('pointerdown', onPointerDown)
canvas.addEventListener('pointermove', onPointerMove)
canvas.addEventListener('pointerup', onPointerUp)
canvas.addEventListener('pointerleave', onPointerUp)

// --- Spawning ---
function spawn() {
  const cfg = PARTICLE_CFG[mode]
  if (!cfg || particles.length >= cfg.max) return
  const sx = W/2 + (Math.random()-0.5)*50, [rMin, rMax] = cfg.r, r = rMin + Math.random()*(rMax - rMin)
  const body = Matter.Bodies.circle(sx, -r, r, { ...cfg.phys, label: 'p' })
  let data = { type: mode, r }
  if (mode === 'water') { const h = WATER_HUES[Math.floor(Math.random()*WATER_HUES.length)]; data = { ...data, hue: h, sat: 70+Math.random()*30, lit: 55+Math.random()*25 } }
  else if (mode === 'animals') data.emoji = EMOS_ANIMALS[Math.floor(Math.random()*EMOS_ANIMALS.length)]
  else if (mode === 'faces') data.emoji = EMOS_FACES[Math.floor(Math.random()*EMOS_FACES.length)]
  else if (mode === 'hearts') data.emoji = EMOS_HEARTS[Math.floor(Math.random()*EMOS_HEARTS.length)]
  else if (mode === 'snow') { data.isBig = r > 5; if (!data.isBig) { data.hue=210; data.sat=15; data.lit=95 } }
  else if (mode === 'candy') { const ci = Math.floor(Math.random()*CANDY_COLORS.length); data.color = CANDY_COLORS[ci]; data.stripe = CANDY_STRIPES[ci] }
  else if (mode === 'bubbles') data.color = BUBBLE_COLORS[Math.floor(Math.random()*BUBBLE_COLORS.length)]
  else if (mode === 'stars') data.emoji = EMOS_STARS[Math.floor(Math.random()*EMOS_STARS.length)]
  Matter.Composite.add(world, body); particles.push({ body, ...data })
}

function updateSpawning() {
  const cfg = PARTICLE_CFG[mode]; if (!cfg) return; spawnCounter++
  if (spawnCounter % cfg.rate === 0) for (let i = 0; i < cfg.batch; i++) spawn()
}

// --- Cleanup ---
function cleanup() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i], pos = p.body.position
    if (pos.y > H+120 || pos.x < -120 || pos.x > W+120 || pos.y < -200) { Matter.Composite.remove(world, p.body); particles.splice(i, 1) }
  }
}

// --- Render ---
function render() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, W, H)
  const g = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, H*0.7)
  g.addColorStop(0, 'rgba(79,195,247,0.04)'); g.addColorStop(1, 'rgba(0,0,0,0)')
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H)

  // Walls
  ctx.shadowColor = 'rgba(79,195,247,0.12)'; ctx.shadowBlur = 10; ctx.lineWidth = 1.5
  for (let i = 0; i < walls.length; i++) {
    const v = walls[i].vertices; ctx.beginPath(); ctx.moveTo(v[0].x, v[0].y)
    for (let j = 1; j < v.length; j++) ctx.lineTo(v[j].x, v[j].y)
    ctx.closePath(); ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.stroke()
  }
  ctx.shadowBlur = 0

  // Draw preview
  if (currentShape === 'draw' && drawPoints.length > 0) {
    ctx.beginPath(); ctx.moveTo(drawPoints[0].x, drawPoints[0].y)
    for (let i = 1; i < drawPoints.length; i++) ctx.lineTo(drawPoints[i].x, drawPoints[i].y)
    ctx.strokeStyle = isDrawing ? 'rgba(79,195,247,0.85)' : 'rgba(255,179,71,0.5)'
    ctx.lineWidth = isDrawing ? 5 : 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke()
    if (!isDrawing && drawPoints.length > 0) {
      ctx.fillStyle = 'rgba(255,179,71,0.1)'
      for (let i = 0; i < walls.length; i++) {
        const c = walls[i].position; ctx.beginPath(); ctx.arc(c.x, c.y, 6, 0, Math.PI*2); ctx.fill()
      }
    }
  }

  // Hint text in draw mode
  if (currentShape === 'draw' && drawPoints.length === 0 && walls.length === 0) {
    ctx.fillStyle = 'rgba(255,179,71,0.25)'; ctx.font = '14px -apple-system, sans-serif'
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
    ctx.fillText('Draw your container shape on the screen', W/2, H/2)
  }

  // Particles
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i], pos = p.body.position
    if (pos.x < -50 || pos.x > W+50 || pos.y < -50 || pos.y > H+50) continue
    const rot = p.body.angle
    if (p.type === 'water') {
      ctx.beginPath(); ctx.arc(pos.x, pos.y, p.r, 0, Math.PI*2); ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,0.85)`; ctx.fill()
      ctx.beginPath(); ctx.arc(pos.x-p.r*0.25, pos.y-p.r*0.25, p.r*0.3, 0, Math.PI*2); ctx.fillStyle = `hsla(${p.hue},${p.sat+10}%,${p.lit+20}%,0.3)`; ctx.fill()
    } else if (p.type === 'snow') {
      if (p.isBig) { ctx.save(); ctx.translate(pos.x, pos.y); ctx.font = `${p.r*2.4}px "Apple Color Emoji","Segoe UI Emoji",sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('❄️',0,0); ctx.restore() }
      else { ctx.beginPath(); ctx.arc(pos.x, pos.y, p.r, 0, Math.PI*2); ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,0.85)`; ctx.fill(); ctx.beginPath(); ctx.arc(pos.x, pos.y, p.r*0.4, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill() }
    } else if (p.type === 'candy') {
      ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(rot)
      ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill()
      ctx.beginPath(); ctx.ellipse(0,0,p.r*0.25,p.r*0.7,rot,0,Math.PI*2); ctx.fillStyle=p.stripe; ctx.fill()
      ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=1; ctx.stroke()
      ctx.restore()
    } else if (p.type === 'bubbles') {
      ctx.beginPath(); ctx.arc(pos.x,pos.y,p.r,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill()
      ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; ctx.stroke()
      ctx.beginPath(); ctx.arc(pos.x-p.r*0.2,pos.y-p.r*0.2,p.r*0.35,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.fill()
    } else {
      ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(rot)
      ctx.font = `${p.r*2}px "Apple Color Emoji","Segoe UI Emoji",sans-serif`
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(p.emoji,0,0); ctx.restore()
    }
  }

  // Paused overlay
  if (isPaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, W, H)
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.font = '28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText('⏸', W/2, H/2)
  }

  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.font = '10px -apple-system, sans-serif'
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'
  ctx.fillText(`gravity (${engine.gravity.x.toFixed(2)}, ${engine.gravity.y.toFixed(2)})`, W/2, H - 4)
}

// --- Loop ---
function loop() {
  if (!isPaused) { Matter.Engine.update(engine, 1000/60); updateSpawning(); cleanup() }
  render()
  requestAnimationFrame(loop)
}

// --- Pause / Speed ---
pauseBtn.addEventListener('click', () => {
  isPaused = !isPaused
  pauseBtn.textContent = isPaused ? '▶' : '⏸'
  pauseBtn.classList.toggle('paused', isPaused)
})

speedSlider.addEventListener('input', () => {
  speedMul = parseFloat(speedSlider.value)
  engine.gravity.scale = 0.001 * speedMul
  speedVal.textContent = speedMul.toFixed(1) + '×'
})

// --- Orientation ---
function onOrientation(e) {
  if (e.gamma == null && e.beta == null) return
  engine.gravity.x = Math.max(-3, Math.min(3, (e.gamma||0)/45))
  engine.gravity.y = Math.max(0.1, Math.min(4, (e.beta||90)/55))
}
function initOrientation() {
  const d = typeof DeviceOrientationEvent
  if (d === 'undefined') return
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    permOverlay.style.display = 'flex'
    permBtn.onclick = async () => {
      try { const r = await DeviceOrientationEvent.requestPermission(); if (r === 'granted') { window.addEventListener('deviceorientation', onOrientation); permOverlay.style.display = 'none' } } catch (_) {}
    }
  } else { window.addEventListener('deviceorientation', onOrientation) }
}

// --- Desktop arrow keys ---
const KEY_GRAVITY = { ArrowLeft: [-1.2,0], ArrowRight: [1.2,0], ArrowUp: [0,0.3], ArrowDown: [0,2.2] }
addEventListener('keydown', e => { const g = KEY_GRAVITY[e.key]; if (g) { engine.gravity.x = g[0]; engine.gravity.y = g[1] } })
addEventListener('keyup', e => { if (e.key.startsWith('Arrow')) { engine.gravity.x = 0; engine.gravity.y = 1 } })

// --- Mode / Shape switch ---
function setMode(m) {
  if (m === mode) return; mode = m
  particles.forEach(p => Matter.Composite.remove(world, p.body)); particles = []
  modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === m))
}

function setShape(s) {
  if (s === currentShape) return; currentShape = s
  particles.forEach(p => Matter.Composite.remove(world, p.body)); particles = []
  drawPoints = []
  shapeBtns.forEach(b => b.classList.toggle('active', b.dataset.shape === s))
  if (s === 'draw') { walls.forEach(w => Matter.Composite.remove(world, w)); walls = []; canvas.style.touchAction = 'none' }
  else { canvas.style.touchAction = 'none'; buildContainer() }
}

modeBtns.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)))
shapeBtns.forEach(b => b.addEventListener('click', () => setShape(b.dataset.shape)))
addEventListener('resize', resize)

// --- Boot ---
if (typeof Matter === 'undefined') { loading.textContent = 'Failed to load Matter.js.'; return }
loading.style.display = 'none'
resize(); initOrientation(); initPi(); loop()

})()
</script>
</body>
</html>
